<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家教AI课堂小结（批量版）</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f7fa;
  padding: 15px;
}
.container {
  max-width: 500px;
  margin: 0 auto;
}
.title {
  font-size: 20px;
  font-weight: 600;
  margin: 10px 0 8px;
  color: #333;
  text-align: center;
}
.tip {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
  text-align: center;
  line-height: 1.4;
}
textarea {
  width: 100%;
  height: 240px;
  padding: 14px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-gen {
  background: #4169e1;
  color: #fff;
}
.btn-clear {
  background: #fff;
  color: #666;
  border: 1px solid #ddd;
}
.result {
  margin-top: 20px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-line;
  position: relative;
}
.copy-all {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #f1f1f1;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <div class="title">家教AI课堂小结（批量版）</div>
  <div class="tip">每行一名学生，直接写情况</div>

  <textarea id="input" placeholder="例如：
小明 数学 小数乘法，上课认真，计算正确率高
小红 语文 阅读理解有进步，态度积极"></textarea>

  <div class="btn-group">
    <button class="btn-gen" onclick="genAll()">批量生成</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="result">
    <button class="copy-all" id="copyBtn" onclick="copyAll()">复制全部</button>
    <div id="resultText"></div>
  </div>
</div>

<script>
async function genAll() {
  const text = document.getElementById('input').value.trim();
  const resText = document.getElementById('resultText');
  const copyBtn = document.getElementById('copyBtn');

  if (!text) {
    alert('请输入学生情况');
    return;
  }

  resText.textContent = "生成中...";
  copyBtn.style.display = "none";

  try {
    const res = await fetch("https://api.mjdai.cc/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer sk-912ddc23ab394f1397321debec548e31"
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{
          role: "user",
          content: `你是专业家庭教师，给家长写课堂小结。
用户每行一个学生，你逐个生成温暖、鼓励、正式、简洁的小结。
只输出小结，不带多余内容，每个前面标学生姓名。

内容：
${text}`
        }]
      })
    });

    const data = await res.json();
    resText.textContent = data.choices?.[0]?.message?.content || "生成失败";
  } catch (e) {
    resText.textContent = "请稍后重试";
  }

  copyBtn.style.display = "block";
}

function clearAll() {
  document.getElementById('input').value = "";
  document.getElementById('resultText').textContent = "";
  document.getElementById('copyBtn').style.display = "none";
}

async function copyAll() {
  try {
    await navigator.clipboard.writeText(document.getElementById('resultText').textContent);
    alert("已复制全部");
  } catch (e) {
    alert("复制成功");
  }
}
</script>
</body>
</html>
