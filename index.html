<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家教AI课堂小结·批量版</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#f6f7f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.container{max-width:500px;margin:0 auto}
.title{font-size:20px;font-weight:600;margin-bottom:8px;color:#222}
.tip{font-size:14px;color:#666;margin-bottom:12px;line-height:1.4}
textarea{width:100%;height:240px;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:16px;resize:none}
.btns{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:14px;border:none;border-radius:12px;font-size:16px}
.btn-gen{background:#3E63F5;color:#fff}
.btn-clear{background:#fff;color:#666;border:1px solid #ddd}
.result{margin-top:16px;padding:16px;background:#fff;border-radius:12px;line-height:1.6;white-space:pre-line;position:relative}
.copy{position:absolute;top:10px;right:10px;background:#f1f1f1;border:none;padding:5px 9px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="title">家教AI课堂小结（批量版）</div>
  <div class="tip">每行一名学生，直接输入情况</div>
  <textarea id="input" placeholder="小明 数学 小数乘法，认真，计算准确
小红 语文 阅读理解进步，态度积极"></textarea>
  <div class="btns">
    <button class="btn-gen" onclick="generate()">批量生成</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>
  <div class="result">
    <button class="copy" id="copyBtn" onclick="copyResult()" style="display:none">复制全部</button>
    <div id="result"></div>
  </div>
</div>

<script>
async function generate() {
  const text = document.getElementById('input').value.trim();
  const res = document.getElementById('result');
  const copyBtn = document.getElementById('copyBtn');

  if (!text) {
    alert('请输入学生情况');
    return;
  }

  res.innerText = '生成中...';
  copyBtn.style.display = 'none';

  try {
    const resp = await fetch('https://api.mjdai.cc/proxy/deepseek', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: 'sk-912ddc23ab394f1397321debec548e31',
        content: text
      })
    });

    const data = await resp.json();
    res.innerText = data.result || '生成失败';
  } catch (e) {
    res.innerText = '网络异常，请重试';
  }

  copyBtn.style.display = 'block';
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('result').innerText = '';
  document.getElementById('copyBtn').style.display = 'none';
}

async function copyResult() {
  try {
    await navigator.clipboard.writeText(document.getElementById('result').innerText);
    alert('已复制');
  } catch (e) {
    alert('复制成功');
  }
}
</script>
</body>
</html>
