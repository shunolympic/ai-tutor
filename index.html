<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语课堂评价生成器</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#f6f7f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.container{max-width:500px;margin:0 auto}
.title{font-size:20px;font-weight:600;margin-bottom:8px;color:#222}
.tip{font-size:14px;color:#666;margin-bottom:12px}
textarea{width:100%;height:240px;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:16px;resize:none}
.btns{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:14px;border:none;border-radius:12px;font-size:16px}
.btn-gen{background:#3E63F5;color:#fff}
.btn-clear{background:#fff;color:#666;border:1px solid #ddd}
.result{margin-top:16px;padding:16px;background:#fff;border-radius:12px;line-height:1.6;white-space:pre-line}
.copy{margin-top:10px;padding:8px 12px;background:#3E63F5;color:#fff;border:none;border-radius:8px}
</style>
</head>
<body>
<div class="container">
  <div class="title">英语课堂评价生成器</div>
  <div class="tip">每行一名学生，输入表现+复习内容</div>

  <textarea id="input" placeholder="小刚 上课开小差 课后复习disease interviewer develop
小红 上课认真 课后复习not only but also语法"></textarea>

  <div class="btns">
    <button class="btn-gen" onclick="start()">生成评价</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="result" id="result"></div>
  <button class="copy" onclick="copyResult()" id="copy" style="display:none">一键复制</button>
</div>

<script>
// ===================== 你的提示词（可随便改） =====================
const PROMPT_TEMPLATE = `
你是一名专业英语家庭教师，请生成一段温柔、亲切、鼓励、适合发给家长的英语课堂评价：
要求：
1. 学生信息每行一个
2. 根据上课评价生成鼓励文案
3. 若有需要课后复习的英文单词或语法等内容，则根据内容生成例句。中英文翻译都需要有
4. 语气温柔有耐心，老师口吻，突出孩子专注、认真、可爱的优点。
5. 先表扬课堂表现，再清晰讲解巩固内容：含义+用法+1–2个简单例句。
6. 结尾温柔鼓励，充满期待。
7. 符合中文语境、风格温暖、正式但不生硬，方便直接发给家长。

学生信息：
{{content}}
`;

// ===================== 密钥加密 =====================
function getApiKey() {
  return atob("c2stOUxUTXpJME5HVmhOVEZtVkoxc05EUXdPbGN5V21wTlUxZE5URXdUVVJDbWs1SFVRPT0=");
}

// ===================== 核心：国内代理（流量/微信都能用） =====================
async function start() {
  const text = document.getElementById("input").value.trim();
  const res = document.getElementById("result");
  const copy = document.getElementById("copy");

  if (!text) { alert("请输入学生信息"); return; }
  res.innerText = "AI 正在生成...";
  copy.style.display = "none";

  try {
    const prompt = PROMPT_TEMPLATE.replace("{{content}}", text);

    const resp = await fetch("https://stable-proxy.vercel.app/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        key: getApiKey(),
        prompt: prompt
      })
    });

    const data = await resp.json();
    res.innerText = data.result || "生成失败，请重试";
  } catch (e) {
    res.innerText = "网络异常，请稍后重试";
  }

  copy.style.display = "block";
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("copy").style.display = "none";
}

async function copyResult() {
  try {
    await navigator.clipboard.writeText(document.getElementById("result").innerText);
    alert("复制成功！");
  } catch (e) {
    alert("复制成功！");
  }
}
</script>
</body>
</html>
