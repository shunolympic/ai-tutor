<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语课堂评价生成器</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#f6f7f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.container{max-width:500px;margin:0 auto}
.title{font-size:20px;font-weight:600;margin-bottom:8px;color:#222}
.tip{font-size:14px;color:#666;margin-bottom:12px;line-height:1.4}
textarea{width:100%;height:240px;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:16px;resize:none}
.btns{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:14px;border:none;border-radius:12px;font-size:16px}
.btn-gen{background:#3E63F5;color:#fff}
.btn-clear{background:#fff;color:#666;border:1px solid #ddd}
.result{margin-top:16px;padding:16px;background:#fff;border-radius:12px;line-height:1.6;white-space:pre-line;position:relative}
.copy{position:absolute;top:10px;right:10px;background:#f1f1f1;border:none;padding:5px 9px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="title">英语课堂评价生成器</div>
  <div class="tip" style="color:red">⚠️ 请在手机浏览器 + WIFI 下使用，微信可能无法打开</div>

  <textarea id="input" placeholder="小明 上课开小差 课后需要复习disease interviewer develop 的用法和例句
小红 上课认真 课后需要复习not only but also语法"></textarea>

  <div class="btns">
    <button class="btn-gen" onclick="generate()">批量生成</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="result">
    <button class="copy" id="copyBtn" onclick="copyResult()" style="display:none">复制全部</button>
    <div id="result"></div>
  </div>
</div>

<script>
// ==============================================
// 你的提示词
// ==============================================
const PROMPT_TEMPLATE = `
你是一名专业英语家庭教师，请生成一段温柔、亲切、鼓励、适合发给家长的英语课堂评价：
要求：
1. 学生信息每行一个
2. 根据上课评价生成鼓励文案
3. 若有需要课后复习的英文单词或语法等内容，则根据内容生成例句。中英文翻译都需要有
4. 语气温柔有耐心，老师口吻，突出孩子专注、认真、可爱的优点。
5. 先表扬课堂表现，再清晰讲解巩固内容：含义+用法+1–2个简单例句。
6. 结尾温柔鼓励，充满期待。
7. 符合中文语境、风格温暖、正式但不生硬，方便直接发给家长。

学生信息：
{{content}}
`;

// ==============================================
// 密钥加密
// ==============================================
function getSecret() {
  return {
    ak: atob("QUtMVE16STFOR1ZoTlRGbVlKamRpTkRSak1qSXlZelE0WlRVbStORFF4T21jeVdtcE5VMXRNeE5SRWV3VFVJQWs1SFE9PQ=="),
    sk: atob("VFVSbkVFMTZXWGhZYW1jelpXZGFhMDVFUFF4T21jeVdtcE5VMXRFeE5SVXd0VVVKYWs1SFE9PQ==")
  };
}

// ==============================================
// 生成
// ==============================================
async function generate() {
  const text = document.getElementById('input').value.trim();
  const res = document.getElementById('result');
  const copyBtn = document.getElementById('copyBtn');

  if (!text) { alert('请输入学生情况'); return; }
  res.innerText = "AI生成中...";
  copyBtn.style.display = "none";

  try {
    const { ak, sk } = getSecret();
    const prompt = PROMPT_TEMPLATE.replace("{{content}}", text);

    const response = await fetch("https://ark.cn-shanghai.aliyuncs.com/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + ak + ":" + sk
      },
      body: JSON.stringify({
        model: "doubao-lite",
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    res.innerText = data.choices?.[0]?.message?.content || "生成失败";
  } catch (e) {
    res.innerText = "⚠️ 请使用 WIFI + 手机浏览器打开";
  }

  copyBtn.style.display = "block";
}

function clearAll() {
  document.getElementById('input').value = "";
  document.getElementById('result').innerText = "";
  document.getElementById('copyBtn').style.display = "none";
}

async function copyResult() {
  try {
    await navigator.clipboard.writeText(document.getElementById('result').innerText);
    alert("已复制");
  } catch (e) {
    alert("复制成功");
  }
}
</script>
</body>
</html>
