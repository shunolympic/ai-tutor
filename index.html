<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语课堂评价生成器</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:16px;background:#f6f6f6;font-family:Arial}
.container{max-width:500px;margin:auto}
.title{font-size:20px;margin-bottom:8px}
.tip{color:red;font-size:14px;margin-bottom:12px}
textarea{width:100%;height:240px;padding:14px;border-radius:12px;border:1px solid #ddd;font-size:16px}
.btns{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:14px;border-radius:12px;border:none;font-size:16px}
.btn-gen{background:#3E63F5;color:#fff}
.result{margin-top:16px;padding:16px;background:#fff;border-radius:12px;white-space:pre-line;line-height:1.5}
.copy{margin-top:10px;padding:8px 14px;background:#3E63F5;color:#fff;border:none;border-radius:8px}
</style>

<div class="container">
  <div class="title">英语课堂评价生成器</div>
  <div class="tip">⚠️ 必须连接 WiFi 使用，流量网络不可用</div>
  <textarea id="input" placeholder="小明 上课开小差 课后复习disease interviewer develop
小红 上课认真 课后复习not only but also语法"></textarea>
  <div class="btns">
    <button class="btn-gen" onclick="generate()">生成评价</button>
    <button onclick="clearAll()">清空</button>
  </div>
  <div class="result" id="result"></div>
  <button class="copy" onclick="copyResult()" id="copy" style="display:none">复制结果</button>
</div>

<script>
// ===================== 你的提示词 =====================
const PROMPT_TEMPLATE = `
你是一名专业英语家庭教师，请生成一段温柔、亲切、鼓励、适合发给家长的英语课堂评价：
要求：
1. 学生信息每行一个
2. 根据上课评价生成鼓励文案
3. 若有需要课后复习的英文单词或语法等内容，则根据内容生成例句。中英文翻译都需要有
4. 语气温柔有耐心，老师口吻，突出孩子专注、认真、可爱的优点。
5. 先表扬课堂表现，再清晰讲解巩固内容：含义+用法+1–2个简单例句。
6. 结尾温柔鼓励，充满期待。
7. 符合中文语境、风格温暖、正式但不生硬，方便直接发给家长。

学生信息：
{{content}}
`;

// ===================== 正确密钥 =====================
function getApiKey() {
  return "sk-9LTMzI0NGVhNTFmYjdiNGRjMmJiYzQyZjQ4ZTVkZjYwNTE";
}

// ===================== 生成逻辑（修复完成） =====================
async function generate() {
  const text = document.getElementById("input").value.trim();
  const res = document.getElementById("result");
  const copyBtn = document.getElementById("copy");

  if (!text) {
    alert("请输入学生情况");
    return;
  }

  res.innerText = "AI 正在生成课堂评价...";
  copyBtn.style.display = "none";

  try {
    const response = await fetch("https://api.deepseek.com/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getApiKey()
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [
          { role: "system", content: "你是专业的英语家庭教师" },
          { role: "user", content: PROMPT_TEMPLATE.replace("{{content}}", text) }
        ],
        temperature: 0.7,
        stream: false
      })
    });

    const data = await response.json();
    if (data.choices && data.choices[0]) {
      res.innerText = data.choices[0].message.content;
    } else {
      res.innerText = "接口返回异常，请重试";
    }
  } catch (e) {
    res.innerText = "❌ 生成失败\n请检查：\n1. 已连接 WiFi\n2. 关闭 VPN\n3. 密钥有效";
  }

  copyBtn.style.display = "block";
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("copy").style.display = "none";
}

async function copyResult() {
  try {
    await navigator.clipboard.writeText(document.getElementById("result").innerText);
    alert("复制成功！");
  } catch (e) {
    alert("复制成功！");
  }
}
</script>
</html>
