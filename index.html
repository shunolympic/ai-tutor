<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家教AI课堂小结（批量版）</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f7fa;
  padding: 15px;
}
.container {
  max-width: 500px;
  margin: 0 auto;
}
.title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #333;
}
.tip {
  font-size: 14px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.4;
}
textarea {
  width: 100%;
  height: 240px;
  padding: 14px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-gen {
  background: #4169e1;
  color: #fff;
}
.btn-clear {
  background: #fff;
  color: #666;
  border: 1px solid #ddd;
}
.result {
  margin-top: 20px;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-line;
  position: relative;
}
.copy-all {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #f1f1f1;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>
<div class="container">
  <div class="title">家教AI课堂小结（批量版）</div>
  <div class="tip">
    每行一名学生，直接写情况<br>
    例：小明 课堂积极认真 课后需要针对not only but also进行针对性的复习<br>
    　　　小红 上课注意力有点不集中 课后需要把Up to date latest 区分，对literature wealthy scene  actress 单词的解释重点复习
  </div>

  <textarea id="input" placeholder="每行一名学生，直接写情况，无需格式"></textarea>

  <div class="btn-group">
    <button class="btn-gen" onclick="genAll()">批量生成</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="result">
    <button class="copy-all" id="copyBtn" onclick="copyAll()">复制全部</button>
    <div id="resultText"></div>
  </div>
</div>

<script>
const API_KEY = "sk-912ddc23ab394f1397321debec548e31";

async function genAll() {
  const text = document.getElementById('input').value.trim();
  const resText = document.getElementById('resultText');
  const copyBtn = document.getElementById('copyBtn');

  if (!text) {
    alert('请输入学生情况');
    return;
  }

  resText.textContent = "AI 生成中...";
  copyBtn.style.display = "none";

  try {
    const response = await fetch("https://api.deepseek.com/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [{
          role: "user",
          content: `你是专业英语家庭教师，根据每行一名学生的信息，生成适合发给家长的课堂小结。
要求：
请生成一段温柔、亲切、鼓励、适合发给家长的英语课堂评价：
学生姓名：【】
课堂表现：【】
课后需重点巩固：【】
要求：
1. 语气温柔有耐心，老师口吻，突出孩子专注、认真、自律的优点。
2. 先表扬课堂表现，再清晰讲解巩固内容：含义+用法+1–2个简单例句。
3. 结尾温柔鼓励，充满期待。
4. 风格温暖、正式但不生硬，方便直接发给家长。
5. 输出语言为中文但是要求复习的单词，句子等还是英文
内容：
${text}`
        }]
      })
    });

    const data = await response.json();
    resText.textContent = data.choices?.[0]?.message?.content || "生成失败";
  } catch (e) {
    resText.textContent = "错误：" + e.message;
  }

  copyBtn.style.display = "block";
}

function clearAll() {
  document.getElementById('input').value = "";
  document.getElementById('resultText').textContent = "";
  document.getElementById('copyBtn').style.display = "none";
}

async function copyAll() {
  const content = document.getElementById('resultText').textContent;
  await navigator.clipboard.writeText(content);
  alert("已复制全部");
}
</script>
</body>
</html>
